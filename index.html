<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fashion Cognition Lab</title>
<link rel="icon" type="image/png" href="./assets/fcl-logo.png">
<link rel="stylesheet" href="./styles.css">
<style>
  @keyframes fclscroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes fclblink { 0%,48% { opacity: 1; } 49%,100% { opacity: 0; } }
  body { margin: 0; overflow-x: hidden; }
  @media (max-width: 860px) {
    header > div[style*="grid"] { grid-template-columns: 1fr !important; }
    #model > div > div[style*="grid"] { grid-template-columns: 1fr !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
  const NS = window.FashionCognitionLabDesignSystem_7bbfa5;
  window.Button = NS.Button; window.Badge = NS.Badge; window.Card = NS.Card;
  window.EyebrowLabel = NS.EyebrowLabel; window.StatBlock = NS.StatBlock;
  window.SpecBar = NS.SpecBar; window.SquiggleUnderline = NS.SquiggleUnderline;
  window.Marquee = NS.Marquee; window.Field = NS.Field;
</script>
<script type="text/babel" src="Nav.jsx" data-presets="react"></script>
<script type="text/babel" src="Hero.jsx" data-presets="react"></script>
<script type="text/babel" src="Studies.jsx" data-presets="react"></script>
<script type="text/babel" src="CaseStudy.jsx" data-presets="react"></script>
<script type="text/babel" src="ValueModel.jsx" data-presets="react"></script>
<script type="text/babel" src="Offer.jsx" data-presets="react"></script>
<script type="text/babel" src="Contact.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
  function App() {
    return (
      <div style={{ background: 'var(--fcl-paper)', color: 'var(--fcl-ink)', fontFamily: 'var(--font-sans)', fontSize: 16, lineHeight: 1.62 }}>
        <Nav />
        <Hero />
        <Manifesto />
        <Studies />
        <CaseStudy />
        <ValueModel />
        <Offer />
        <Researchers />
        <Contact />
        <Footer />
      </div>
    );
  }
  // wait for all babel src scripts to register their globals
  function mount() {
    if (window.Nav && window.Hero && window.Studies && window.CaseStudy && window.ValueModel && window.Offer && window.Contact) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    } else {
      setTimeout(mount, 40);
    }
  }
  mount();
</script>
</body>
</html>
