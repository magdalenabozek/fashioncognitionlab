<script type="text/babel" data-presets="react">

    return (

        <Studies />
        <CaseStudy />
        <ValueModel />
        <Offer />
        <Researchers />
        <Contact />
        <Footer />
      </div>
    );
  }
  // wait for all babel src scripts to register their globals
  function mount() {
    if (window.Nav && window.Hero && window.Studies && window.CaseStudy && window.ValueModel && window.Offer && window.Contact) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);

      setTimeout(mount, 40);
